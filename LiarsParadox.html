      // 解析词库
      const categories = [];
      const lines = rawData.trim().split('\n');
      let currentCat = null;
      for (let line of lines) {
        line = line.trim();
        if (line === '') continue;
        if (line.startsWith('二次元分区') || line.startsWith('常规用词')) {
          if (currentCat) categories.push(currentCat);
          currentCat = { name: line, words: [] };
        } else if (currentCat) {
          const words = line.split(',').map(w => w.trim()).filter(w => w.length > 0);
          currentCat.words.push(...words);
        }
      }
      if (currentCat) categories.push(currentCat);

      // ---------- DOM 元素 ----------
      const pages = {
        home: document.getElementById('homePage'),
        players: document.getElementById('playersPage'),
        categories: document.getElementById('categoriesPage'),
        gameView: document.getElementById('gameViewPage'),
        discuss: document.getElementById('discussPage'),
        result: document.getElementById('resultPage')
      };
      const playerCountDisplay = document.getElementById('playerCountDisplay');
      const categoryListContainer = document.getElementById('categoryListContainer');
      const viewPrompt = document.getElementById('viewPrompt');
      const wordDisplayArea = document.getElementById('wordDisplayArea');
      const civilianWordDisplay = document.getElementById('civilianWordDisplay');
      const spyWordDisplay = document.getElementById('spyWordDisplay');
      const nextHint = document.getElementById('nextHint');
      const viewNextBtn = document.getElementById('viewNextBtn');
      const resultTitle = document.getElementById('resultTitle');
      const revealWord = document.getElementById('revealWord');
      const rulesModal = document.getElementById('rulesModal');
      const settingsModal = document.getElementById('settingsModal');
      const accuseModal = document.getElementById('accuseModal');
      const accusePlayerList = document.getElementById('accusePlayerList');

      // ---------- 游戏状态 ----------
      let playerCount = 3;
      let excludedIndices = new Set(); // 被排除的分类索引
      let currentCivilianWord = '';
      let spyPlayerIndex = 1; // 1~n
      let currentViewPlayer = 1;
      let viewStep = 0; // 0:等待点击查看, 1:已显示词语, 2:可切换下一位
      let gameActive = false;

      // ---------- 工具函数 ----------
      function showPage(pageId) {
        Object.values(pages).forEach(p => p.classList.remove('active'));
        const target = document.getElementById(pageId);
        if (target) target.classList.add('active');
      }

      function openModal(modal) { modal.classList.add('active'); }
      function closeModal(modal) { modal.classList.remove('active'); }

      function getAvailableWords() {
        const pool = [];
        categories.forEach((cat, idx) => {
          if (!excludedIndices.has(idx)) {
            pool.push(...cat.words);
          }
        });
        return pool;
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function startNewRound() {
        const words = getAvailableWords();
        if (words.length === 0) {
          alert('当前词条范围为空，请调整排除设置！');
          return false;
        }
        currentCivilianWord = words[randomInt(0, words.length - 1)];
        spyPlayerIndex = randomInt(1, playerCount);
        currentViewPlayer = 1;
        viewStep = 0;
        gameActive = true;
        updateGameView();
        showPage('gameViewPage');
        return true;
      }

      function updateGameView() {
        viewPrompt.textContent = `你是 ${currentViewPlayer} 号玩家，请查看自己的词语，注意不要被别人看到！`;
        wordDisplayArea.style.display = 'none';
        viewNextBtn.textContent = '点击查看词语';
        viewNextBtn.style.display = 'block';
        viewStep = 0;
      }

      function revealCurrentPlayerWord() {
        const isSpy = (currentViewPlayer === spyPlayerIndex);
        wordDisplayArea.style.display = 'flex';
        if (isSpy) {
          civilianWordDisplay.style.display = 'none';
          spyWordDisplay.style.display = 'block';
          spyWordDisplay.textContent = '🕵️ 你是卧底！隐藏自己，猜出他们的小心思！';
          nextHint.textContent = '查看完毕后点击屏幕并传递给下一位玩家';
        } else {
          civilianWordDisplay.style.display = 'block';
          spyWordDisplay.style.display = 'none';
          civilianWordDisplay.textContent = currentCivilianWord;
          nextHint.textContent = '查看完毕后点击屏幕并传递给下一位玩家';
        }
        viewNextBtn.textContent = '传递给下一位玩家';
        viewStep = 1;
      }

      function goToNextPlayerOrDiscuss() {
        if (currentViewPlayer < playerCount) {
          currentViewPlayer++;
          updateGameView();
        } else {
          // 所有玩家查看完毕，进入讨论环节
          showPage('discussPage');
        }
      }

      function resetGameToCategories() {
        showPage('categoriesPage');
        gameActive = false;
        renderCategoryList();
      }

      function backToHome() {
        showPage('homePage');
        gameActive = false;
      }

      // 设置主题
      function applyTheme(primaryColor, darkMode) {
        document.documentElement.style.setProperty('--primary', primaryColor);
        document.documentElement.style.setProperty('--primary-rgb', primaryColor.replace('#','').match(/.{2}/g).map(v=>parseInt(v,16)).join(','));
        if (darkMode) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
        localStorage.setItem('wwd_primary', primaryColor);
        localStorage.setItem('wwd_dark', darkMode ? '1' : '0');
        updateColorDotSelection(primaryColor);
      }

      function updateColorDotSelection(color) {
        document.querySelectorAll('#themeColorPicker .color-dot').forEach(dot => {
          dot.classList.toggle('selected', dot.dataset.color === color);
        });
      }

      // 加载设置
      const savedPrimary = localStorage.getItem('wwd_primary') || '#66CCFF';
      const savedDark = localStorage.getItem('wwd_dark') === '1';
      applyTheme(savedPrimary, savedDark);

      // 渲染分类列表
      function renderCategoryList() {
        categoryListContainer.innerHTML = '';
        categories.forEach((cat, idx) => {
          const div = document.createElement('div');
          div.className = 'category-item';
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.id = `cat-${idx}`;
          checkbox.checked = excludedIndices.has(idx);
          checkbox.addEventListener('change', (e) => {
            if (e.target.checked) excludedIndices.add(idx);
            else excludedIndices.delete(idx);
          });
          const label = document.createElement('label');
          label.htmlFor = `cat-${idx}`;
          label.textContent = `不要 ${cat.name} 相关词条`;
          div.appendChild(checkbox);
          div.appendChild(label);
          categoryListContainer.appendChild(div);
        });
      }

      // 指认弹窗
      function openAccuseModal() {
        accusePlayerList.innerHTML = '';
        for (let i = 1; i <= playerCount; i++) {
          const btn = document.createElement('button');
          btn.className = 'btn small';
          btn.textContent = `${i} 号玩家`;
          btn.style.margin = '0.3rem';
          btn.addEventListener('click', () => {
            closeModal(accuseModal);
            handleAccuse(i);
          });
          accusePlayerList.appendChild(btn);
        }
        openModal(accuseModal);
      }

      function handleAccuse(selectedPlayer) {
        const isSpy = (selectedPlayer === spyPlayerIndex);
        endGame(isSpy ? '平民胜利！' : '卧底胜利！');
      }

      function handleGuessWord(guessedWord) {
        const trimmed = guessedWord.trim();
        if (trimmed === currentCivilianWord) {
          endGame('卧底胜利！');
        } else {
          endGame('平民胜利！');
        }
      }

      function endGame(title) {
        gameActive = false;
        resultTitle.textContent = title;
        revealWord.textContent = currentCivilianWord;
        showPage('resultPage');
      }

      // ---------- 事件绑定 ----------
      document.getElementById('startGameBtn').addEventListener('click', () => {
        showPage('playersPage');
      });

      document.getElementById('rulesBtn').addEventListener('click', () => openModal(rulesModal));
      document.getElementById('closeRules').addEventListener('click', () => closeModal(rulesModal));
      document.getElementById('followBtn').addEventListener('click', () => {
        window.open('https://space.bilibili.com/1444391042', '_blank');
      });
      document.getElementById('settingsBtn').addEventListener('click', () => openModal(settingsModal));
      document.getElementById('closeSettings').addEventListener('click', () => closeModal(settingsModal));

      // 人数选择
      document.getElementById('minusBtn').addEventListener('click', () => {
        if (playerCount > 3) { playerCount--; playerCountDisplay.textContent = playerCount; }
      });
      document.getElementById('plusBtn').addEventListener('click', () => {
        if (playerCount < 20) { playerCount++; playerCountDisplay.textContent = playerCount; }
      });
      document.getElementById('confirmPlayersBtn').addEventListener('click', () => {
        renderCategoryList();
        showPage('categoriesPage');
      });
      document.getElementById('backToHome1').addEventListener('click', backToHome);
      document.getElementById('backToPlayers').addEventListener('click', () => showPage('playersPage'));

      document.getElementById('resetExcludeBtn').addEventListener('click', () => {
        excludedIndices.clear();
        renderCategoryList();
      });

      document.getElementById('startGameAfterCategories').addEventListener('click', () => {
        if (startNewRound()) {
          // 成功
        }
      });

      // 查看词语流程
      viewNextBtn.addEventListener('click', () => {
        if (!gameActive) return;
        if (viewStep === 0) {
          revealCurrentPlayerWord();
        } else if (viewStep === 1) {
          goToNextPlayerOrDiscuss();
        }
      });

      // 讨论环节
      document.getElementById('findSpyBtn').addEventListener('click', openAccuseModal);
      document.getElementById('guessWordBtn').addEventListener('click', () => {
        const word = prompt('请输入你认为的平民词：');
        if (word !== null && word.trim() !== '') {
          handleGuessWord(word);
        }
      });
      document.getElementById('closeAccuse').addEventListener('click', () => closeModal(accuseModal));

      // 结果页按钮
      document.getElementById('playAgainBtn').addEventListener('click', () => {
        if (startNewRound()) {}
      });
      document.getElementById('homeAfterResult').addEventListener('click', backToHome);
      document.getElementById('followAfterResult').addEventListener('click', () => {
        window.open('https://space.bilibili.com/1444391042', '_blank');
      });

      // 设置主题色
      document.querySelectorAll('#themeColorPicker .color-dot').forEach(dot => {
        dot.addEventListener('click', () => {
          const color = dot.dataset.color;
          const isDark = document.body.classList.contains('dark');
          applyTheme(color, isDark);
        });
      });
      document.getElementById('lightModeBtn').addEventListener('click', () => {
        const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
        applyTheme(primary, false);
      });
      document.getElementById('darkModeBtn').addEventListener('click', () => {
        const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
        applyTheme(primary, true);
      });

      // 点击模态框背景关闭
      window.addEventListener('click', (e) => {
        if (e.target === rulesModal) closeModal(rulesModal);
        if (e.target === settingsModal) closeModal(settingsModal);
        if (e.target === accuseModal) closeModal(accuseModal);
      });

      // 初始显示首页
      showPage('homePage');
    })();
  </script>
</body>
</html>
